name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ADB (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          curl -O https://dl.google.com/android/repository/platform-tools-latest-windows.zip
          unzip platform-tools-latest-windows.zip
          mkdir -p bin/win
          cp platform-tools/adb.exe bin/win/
          cp platform-tools/AdbWinApi.dll bin/win/
          cp platform-tools/AdbWinUsbApi.dll bin/win/

      - name: Download ADB (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          curl -O https://dl.google.com/android/repository/platform-tools-latest-darwin.zip
          unzip platform-tools-latest-darwin.zip
          mkdir -p bin/mac
          cp platform-tools/adb bin/mac/
          chmod +x bin/mac/adb

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --hidden-import win32clipboard --add-data "bin/win/adb.exe:bin/win" --add-data "bin/win/AdbWinApi.dll:bin/win" --add-data "bin/win/AdbWinUsbApi.dll:bin/win" --collect-all customtkinter --collect-all tkinterdnd2 --name "ADBHelper-${{ github.ref_name }}" main.py
          
      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconsole --windowed --add-data "bin/mac/adb:bin/mac" --collect-all customtkinter --collect-all tkinterdnd2 --name "ADBHelper" main.py
          cd dist
          zip -r ADBHelper-macOS-${{ github.ref_name }}.zip ADBHelper.app

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ADBHelper-${{ github.ref_name }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ADBHelper-macOS-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
